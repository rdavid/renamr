---
name: rake
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rake:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-slim
          - windows-2022
          - windows-2025
          - windows-2025-vs2026
        ruby:
          - 3.2
          - 3.3
          - 3.4
          - 3.5
        exclude:
          - os: windows-2022
            ruby: 3.5
          - os: windows-2025
            ruby: 3.5
          - os: windows-2025-vs2026
            ruby: 3.5
    name: Rake on ${{ matrix.os }} / Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ruby/setup-ruby@v1.313.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake
